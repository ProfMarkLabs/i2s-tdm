[common]
board = icefun

; TDM aggregator with 8 mics
[env:tdm8]
top-module = main
default-testbench = main_tb.sv
constraint-file = main_tdm8.pcf
defines =
    TDM8

; TDM aggregator with 24 mics
[env:tdm24]
top-module = main
default-testbench = main_tb.sv
constraint-file = main_tdm24.pcf
defines =
    TDM24

; LOOPBACK build only - DO NOT USE for student projects
[env:loopback]
top-module = loopback
default-testbench = loopback_tb.sv
constraint-file = loopback.pcf
defines =
    TDM8
